<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" role="img" aria-label="CampusTutor VUT logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08306e"/>
      <stop offset="100%" stop-color="#1a5cb8"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <rect width="56" height="56" rx="14" fill="url(#bg)"/>

  <!-- Inner shine overlay -->
  <rect width="56" height="28" rx="14" fill="url(#shine)"/>

  <!-- Gold top-left corner accent -->
  <rect x="0" y="0" width="4" height="24" rx="2" fill="#f4b400" opacity="0.9"/>

  <!-- "C" in white -->
  <text
    x="9" y="37"
    font-family="'Inter','Segoe UI',Arial,sans-serif"
    font-size="26"
    font-weight="800"
    fill="#ffffff"
    letter-spacing="-1">C</text>

  <!-- "T" in gold -->
  <text
    x="30" y="37"
    font-family="'Inter','Segoe UI',Arial,sans-serif"
    font-size="26"
    font-weight="800"
    fill="#f4b400"
    letter-spacing="-1">T</text>

  <!-- Gold underline bar -->
  <rect x="9" y="42" width="38" height="3.5" rx="1.75" fill="#f4b400"/>

  <!-- "VUT" micro-label -->
  <text
    x="28" y="53"
    text-anchor="middle"
    font-family="'Inter','Segoe UI',Arial,sans-serif"
    font-size="6.5"
    font-weight="700"
    fill="rgba(255,255,255,0.55)"
    letter-spacing="1.5">VUT</text>
</svg>
